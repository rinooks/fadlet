name: Firestore Rules Tests

# 보안 규칙/규칙 테스트/관련 설정이 바뀌면 에뮬레이터로 규칙 테스트를 돌린다.
# 비-슈퍼 사용자 권한 케이스(예: members collectionGroup)를 CI에서 고정해 회귀를 막는다.
on:
  push:
    branches: [master]
    paths:
      - 'firestore.rules'
      - 'tests/**'
      - 'firebase.json'
      - 'vitest.config.ts'
      - 'package.json'
      - '.github/workflows/firestore-rules.yml'
  pull_request:
    paths:
      - 'firestore.rules'
      - 'tests/**'
      - 'firebase.json'
      - 'vitest.config.ts'

jobs:
  rules-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Firestore 에뮬레이터는 Java가 필요하다
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - run: npm ci

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Run security rules tests
        run: firebase emulators:exec --only firestore "vitest run"
